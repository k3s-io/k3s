name: Validate
on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "channel.yaml"
      - "install.sh"
      - "tests/**"
      - "!tests/e2e**"
      - "!tests/docker**"
      - ".github/**"
      - "!.github/actions/**"
      - "!.github/workflows/validate.yaml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Remove Unnecessary Tools
        working-directory: /
        run: |
          sudo rm -rf \
            /home/linuxbrew \
            /home/packer \
            /opt/az \
            /opt/microsoft \
            /usr/lib/firefox \
            /usr/lib/google-cloud-sdk \
            /usr/local/julia* \
            /usr/local/share/boost \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/az* \
            /usr/share/dotnet \
            /usr/share/miniconda \
            /usr/share/swift
          df -khl

      - name: Set Commit Count
        run: |
          echo "GITHUB_CHECKOUT_FETCH_DEPTH=$( expr 1 + ${{ github.event.pull_request.commits }} )" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: ${{ env.GITHUB_CHECKOUT_FETCH_DEPTH }}

      - name: Set Go Version
        run: |
          source ./scripts/version.sh
          echo "GOTOOLCHAIN=${VERSION_GOLANG/go}" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          go-version: "${{ env.GOTOOLCHAIN }}"

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11
          args: "--new-from-merge-base ${{ github.event.pull_request.base.sha }}"
          skip-save-cache: ${{ github.ref != 'refs/heads/main' }}

      - name: Lint (windows)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11
          args: "--new-from-merge-base ${{ github.event.pull_request.base.sha }} ./pkg/... ./cmd/..."
          skip-save-cache: ${{ github.ref != 'refs/heads/main' }}
        env:
          GOOS: "windows"

      - name: Validate
        run: ./scripts/validate
        env:
          SKIP_LINT: "true"

      - name: Validate (windows)
        run: ./scripts/validate
        env:
          SKIP_LINT: "true"
          GOOS: "windows"
